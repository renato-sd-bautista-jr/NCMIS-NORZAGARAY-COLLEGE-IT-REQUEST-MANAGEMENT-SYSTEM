<!-- Filter Device Modal -->
<div id="filterDeviceModal"
  class="fixed inset-0 hidden z-[70] flex items-center justify-center bg-slate-900/55 backdrop-blur-sm p-4 sm:p-6"
     onclick="if (event.target === this) closeDeviceFilterModal()">
  <div id="deviceFilterModalContent"
       class="relative w-full max-w-4xl overflow-hidden rounded-2xl border border-blue-100 bg-gradient-to-b from-white via-white to-slate-50 shadow-[0_34px_70px_-38px_rgba(30,64,175,0.65)] transform transition duration-200 scale-95">
    <div class="border-b border-slate-200 bg-white/90 px-5 sm:px-6 py-4">
      <button
        type="button"
        onclick="closeDeviceFilterModal()"
        class="absolute right-4 top-4 inline-flex items-center justify-center h-9 w-9 rounded-full border border-slate-200 text-slate-500 transition hover:bg-slate-100 hover:text-slate-700"
        aria-label="Close filter modal">
        <i data-lucide="x" class="w-4 h-4"></i>
      </button>
      <div class="inline-flex h-10 w-10 items-center justify-center rounded-xl bg-blue-100 text-blue-700 mb-3">
        <i data-lucide="sliders-horizontal" class="w-5 h-5"></i>
      </div>
      <h2 class="text-xl sm:text-2xl font-semibold text-slate-800">Filter Devices</h2>
      <p class="text-xs sm:text-sm text-slate-500 mt-1">Narrow down item and consumable results quickly.</p>
    </div>

    <form id="filterDeviceForm" class="grid grid-cols-1 sm:grid-cols-2 gap-4 px-5 sm:px-6 py-5 max-h-[70vh] overflow-y-auto">
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-600">Department</label>
        <select name="department_id" class="mt-1 w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-700 shadow-sm outline-none transition focus:border-blue-400 focus:ring-4 focus:ring-blue-100">
          <option value="">All</option>
          {% for dept in departments %}
          <option value="{{ dept.department_id }}">{{ dept.department_name }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-600">Status</label>
        <select name="status" class="mt-1 w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-700 shadow-sm outline-none transition focus:border-blue-400 focus:ring-4 focus:ring-blue-100">
          <option value="">All</option>
          <option value="Available">Available</option>
          <option value="In Used">In Used</option>
          <option value="Inactive">Inactive</option>
          <option value="Damaged">Damaged</option>
        </select>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-600">Accountable</label>
        <input type="text" name="accountable" class="mt-1 w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-700 shadow-sm outline-none transition focus:border-blue-400 focus:ring-4 focus:ring-blue-100" />
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-600">Serial No</label>
        <input type="text" name="serial_no" class="mt-1 w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-700 shadow-sm outline-none transition focus:border-blue-400 focus:ring-4 focus:ring-blue-100" />
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-600">Item Name</label>
        <input type="text" name="item_name" class="mt-1 w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-700 shadow-sm outline-none transition focus:border-blue-400 focus:ring-4 focus:ring-blue-100" />
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-600">Brand / Model</label>
        <input type="text" name="brand_model" class="mt-1 w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-700 shadow-sm outline-none transition focus:border-blue-400 focus:ring-4 focus:ring-blue-100" />
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-600">Device Type</label>
        <input type="text" name="device_type" class="mt-1 w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-700 shadow-sm outline-none transition focus:border-blue-400 focus:ring-4 focus:ring-blue-100" />
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-600">Date From</label>
        <input type="date" name="date_from" class="mt-1 w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-700 shadow-sm outline-none transition focus:border-blue-400 focus:ring-4 focus:ring-blue-100" />
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-600">Date To</label>
        <input type="date" name="date_to" class="mt-1 w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-700 shadow-sm outline-none transition focus:border-blue-400 focus:ring-4 focus:ring-blue-100" />
      </div>

      <div class="col-span-full flex flex-wrap justify-end gap-3 mt-2 pt-4 border-t border-slate-200">
        <button type="button" onclick="closeDeviceFilterModal()" class="px-4 py-2.5 rounded-xl border border-slate-300 bg-white text-slate-700 text-sm font-semibold hover:bg-slate-100 transition">
          Cancel
        </button>
        <button type="submit" class="px-5 py-2.5 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-sm font-semibold shadow-[0_14px_24px_-18px_rgba(37,99,235,0.8)] hover:from-blue-700 hover:to-indigo-700 transition">
          Apply Filters
        </button>
      </div>
    </form>
  </div>
</div>
