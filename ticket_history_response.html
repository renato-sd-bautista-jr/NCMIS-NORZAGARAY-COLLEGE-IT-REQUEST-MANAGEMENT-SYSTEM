<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ticketing System - NCMIS</title>
 <script src="/static/js/tailwind.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --ink-950: #071427;
      --ink-900: #0b1c36;
      --ink-800: #163159;
      --primary-500: #1f78f7;
      --primary-400: #42a1ff;
      --accent-400: #5bb6ff;
      --warm-300: #a8d4ff;
      --glass-bg: rgba(8, 24, 45, 0.6);
      --glass-border: rgba(206, 227, 255, 0.2);
    }

    * { font-family: 'Outfit', sans-serif; }

    .display-font {
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: -0.02em;
    }

    .login-backdrop {
      position: relative;
      background:
        radial-gradient(1200px 700px at 12% 12%, rgba(66, 161, 255, 0.22), transparent 62%),
        radial-gradient(900px 600px at 88% 84%, rgba(31, 120, 247, 0.2), transparent 65%),
        linear-gradient(125deg, var(--ink-950) 0%, var(--ink-900) 55%, #102f57 100%);
      animation: gradient-shift 20s ease infinite;
      background-size: 130% 130%;
    }

    .login-backdrop::before,
    .login-backdrop::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .login-backdrop::before {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to right, transparent 2%, black 28%, black 72%, transparent 98%);
      opacity: 0.34;
    }

    .login-backdrop::after {
      background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.08), transparent 50%);
      mix-blend-mode: screen;
      opacity: 0.65;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 18px rgba(31, 120, 247, 0.4); }
      50% { box-shadow: 0 0 34px rgba(66, 161, 255, 0.65); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-14px) rotate(-2deg); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes btn-pulse {
      0%, 100% {
        box-shadow: 0 14px 38px rgba(31, 120, 247, 0.5), inset 0 0 24px rgba(255, 255, 255, 0.08);
      }
      50% {
        box-shadow: 0 18px 46px rgba(31, 120, 247, 0.68), inset 0 0 30px rgba(255, 255, 255, 0.16);
      }
    }

    .animate-shake { animation: shake .5s ease-in-out; }
    .animate-fade-in-up { animation: fade-in-up .85s ease-out both; }
    .animate-glow { animation: glow 2.2s ease-in-out infinite; }

    .glass-morphism {
      background: linear-gradient(155deg, rgba(18, 46, 82, 0.76), rgba(8, 22, 40, 0.6));
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 26px 60px rgba(1, 8, 19, 0.45);
    }

    .brand-card {
      position: relative;
      overflow: hidden;
    }

    .brand-card::before {
      content: "";
      position: absolute;
      inset: -40% -20%;
      background: conic-gradient(from 180deg, transparent, rgba(31, 120, 247, 0.16), transparent 35%, rgba(66, 161, 255, 0.22), transparent 70%);
      animation: shimmer 8s linear infinite;
      pointer-events: none;
    }

    .brand-card > * {
      position: relative;
      z-index: 1;
    }

    .login-card {
      background: linear-gradient(160deg, rgba(13, 33, 60, 0.74), rgba(12, 26, 49, 0.66));
      border: 1px solid rgba(204, 227, 255, 0.26);
      box-shadow: 0 24px 56px rgba(2, 10, 24, 0.52);
    }

    .auth-input {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(175, 207, 247, 0.32);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      transition: all 0.3s ease;
    }

    .auth-input::placeholder {
      color: rgba(215, 227, 245, 0.58);
    }

    .auth-input:focus {
      border-color: rgba(66, 161, 255, 0.85);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 0 4px rgba(66, 161, 255, 0.22), 0 12px 28px rgba(2, 11, 27, 0.34);
    }

    .auth-icon {
      color: rgba(214, 227, 246, 0.55);
      transition: color 0.25s ease;
    }

    .group:focus-within .auth-icon {
      color: var(--accent-400);
    }

    .toggle-password-btn {
      color: rgba(220, 232, 247, 0.74);
    }

    .toggle-password-btn:hover {
      color: var(--warm-300);
    }

    .auth-submit {
      background: linear-gradient(115deg, #1761cd 0%, var(--primary-500) 45%, #2598ee 70%, var(--accent-400) 100%);
      box-shadow: 0 14px 38px rgba(21, 97, 205, 0.48);
      transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
    }

    .auth-submit:hover {
      transform: translateY(-1px) scale(1.01);
      box-shadow: 0 18px 44px rgba(31, 120, 247, 0.58);
      filter: saturate(1.15);
    }

    .btn-loading {
      cursor: not-allowed;
      opacity: 0.95;
      transform: scale(1) !important;
      animation: btn-pulse 1.4s ease-in-out infinite;
    }

    .btn-loading::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      background-size: 220% 100%;
      animation: shimmer 1.1s linear infinite;
    }

    .loading-box {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.92);
      background: rgba(8, 22, 40, 0.92);
      border: 1px solid rgba(210, 229, 255, 0.24);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 24px 32px;
      box-shadow: 0 22px 56px rgba(0, 0, 0, 0.42);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: all 0.28s ease;
    }

    .loading-box.active {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
    }

    .loading-box .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(185, 208, 239, 0.26);
      border-top-color: var(--primary-400);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-box p {
      color: #eff6ff;
      font-size: 14px;
      font-weight: 600;
      margin: 0;
    }

    .loading-box-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 8, 18, 0.48);
      backdrop-filter: blur(2px);
      z-index: 9998;
      opacity: 0;
      visibility: hidden;
      transition: all 0.28s ease;
    }

    .loading-box-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .particle {
      position: absolute;
      pointer-events: none;
      opacity: 0.35;
      animation: float 8s ease-in-out infinite;
    }

    @media (max-width: 1023px) {
      .login-backdrop::before {
        mask-image: none;
        opacity: 0.2;
      }
    }
  </style>
</head>
<body class="h-screen w-screen flex overflow-hidden login-backdrop">

  <!-- Floating Particles -->
  <div class="particle top-10 left-10 text-white/20 text-4xl"><i class="fas fa-box"></i></div>
  <div class="particle top-1/3 right-20 text-white/10 text-6xl" style="animation-delay: 2s;"><i class="fas fa-cube"></i></div>
  <div class="particle bottom-1/4 left-1/4 text-white/15 text-5xl" style="animation-delay: 4s;"><i class="fas fa-database"></i></div>
  <div class="particle top-1/2 right-1/3 text-white/20 text-3xl" style="animation-delay: 1s;"><i class="fas fa-server"></i></div>

  <!-- Left Panel -->
  <div class="hidden lg:block flex-1 relative overflow-hidden">
    <div class="absolute inset-0 bg-cover bg-center scale-105" style="background-image: url('/static/Image2.jpg'); filter: brightness(0.5) saturate(1.25) contrast(1.05);"></div>
    <div class="absolute inset-0 bg-gradient-to-br from-black/40 via-transparent to-blue-900/25 backdrop-blur-[1px]"></div>
    
    <!-- Animated Gradient Overlay -->
    <div class="absolute inset-0 opacity-25">
      <div class="absolute inset-0 login-backdrop"></div>
    </div>
    
    <!-- Content -->
    <div class="relative z-10 flex items-center justify-center h-full p-12">
      <div class="glass-morphism brand-card rounded-3xl p-12 max-w-2xl mx-auto animate-fade-in-up">
        <div class="text-center">
          <div class="text-8xl mb-8 text-blue-300">
            <i class="fas fa-box-open"></i>
          </div>
          <h1 class="display-font text-7xl font-black text-white mb-6 tracking-tight">
            NCMIS
          </h1>
          <div class="w-32 h-1 mx-auto mb-8 rounded-full bg-gradient-to-r from-blue-300 via-blue-400 to-blue-500 animate-glow"></div>
          <p class="text-2xl text-white/90 font-light leading-relaxed">
            NORZAGARAY COLLEGE<br/>
            <span class="text-blue-300 font-semibold">Management Information System</span>
          </p>
          <div class="mt-10 flex justify-center gap-8 text-white/60">
            <div class="text-center">
              <i class="fas fa-shield-alt text-3xl mb-2 text-blue-300"></i>
              <p class="text-sm">Secure</p>
            </div>
            <div class="text-center">
              <i class="fas fa-rocket text-3xl mb-2 text-blue-300"></i>
              <p class="text-sm">Fast</p>
            </div>
            <div class="text-center">
              <i class="fas fa-chart-line text-3xl mb-2 text-blue-300"></i>
              <p class="text-sm">Efficient</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="w-full lg:w-[650px] flex flex-col justify-center items-center lg:justify-start lg:items-start pt-12 lg:pt-20 px-8 lg:px-24">
    <div class="w-full max-w-md lg:max-w-lg mx-auto animate-fade-in-up" style="animation-delay: 0.3s;">

      <!-- Mobile Logo -->
      <div class="lg:hidden text-center mb-8">
        <div class="text-6xl mb-4 text-blue-300">
          <i class="fas fa-box-open"></i>
        </div>
        <h1 class="display-font text-4xl font-black text-white mb-2">NCMIS</h1>
        <p class="text-blue-100/80 text-sm tracking-wide">NORZAGARAY COLLEGE MIS</p>
      </div>

      <!-- Login Card -->
      <div class="glass-morphism login-card rounded-3xl p-8 lg:p-10 shadow-2xl">
        
        <!-- Header -->
        <div class="text-center mb-8">
          <div class="hidden lg:block text-5xl mb-6 text-blue-300">
            <i class="fas fa-user-circle"></i>
          </div>
          <h2 class="display-font text-3xl lg:text-4xl font-bold text-white mb-3">
            Welcome Back
          </h2>
          <p class="text-slate-200/80 text-lg">Sign in to access your dashboard</p>
          <div class="w-24 h-1 mx-auto mt-4 rounded-full bg-gradient-to-r from-blue-300 to-blue-500"></div>
        </div>

        <!-- Error Messages -->
        
          
        

        <!-- Form -->
        <form method="POST" action="/login/" class="space-y-5" id="loginForm">

          <!-- Username Field -->
          <div class="group">
            <label class="block text-slate-200/80 text-sm font-medium mb-2 tracking-wide">Username</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fas fa-user auth-icon"></i>
              </div>
              <input type="text" 
                     name="username" 
                     placeholder="Enter your username" 
                     required
                     class="w-full pl-12 pr-4 py-4 rounded-2xl text-white focus:outline-none auth-input transition-all duration-300 text-lg">
            </div>
          </div>

          <!-- Password Field -->
          <div class="group">
            <label class="block text-slate-200/80 text-sm font-medium mb-2 tracking-wide">Password</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fas fa-lock auth-icon"></i>
              </div>
              <input type="password" 
                     id="password" 
                     name="password" 
                     placeholder="Enter your password" 
                     required
                     class="w-full pl-12 pr-14 py-4 rounded-2xl text-white focus:outline-none auth-input transition-all duration-300 text-lg">
              
              <!-- Toggle Password -->
              <button type="button" 
                      id="toggle-password"
                      class="absolute inset-y-0 right-0 pr-4 flex items-center toggle-password-btn transition-colors"
                      aria-label="Toggle password visibility">
                <i id="eye-icon" class="fas fa-eye text-xl"></i>
              </button>
            </div>
          </div>

          <!-- Remember Me -->
          <div class="flex items-center justify-start pt-2">
            <label class="flex items-center text-slate-200/80 cursor-pointer hover:text-white transition-colors">
              <input type="checkbox" class="mr-2 w-4 h-4 rounded border-slate-300/40 bg-white/10 focus:ring-blue-300 focus:border-blue-300">
              <span class="text-sm">Remember me</span>
            </label>
          </div>

          <!-- Submit Button -->
          <button type="submit" 
                  id="submitBtn"
                  class="w-full py-4 mt-6 text-white font-bold rounded-2xl auth-submit flex items-center justify-center gap-3 text-lg relative overflow-hidden">
            <span id="btnSpinner" class="hidden">
              <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
            </span>
            <span id="btnText">Sign In</span>
            <i id="btnIcon" class="fas fa-arrow-right"></i>
          </button>

          </form>

        <!-- Footer -->
        <div class="mt-8 text-center text-slate-300/60 text-sm">
          <p>© 2026 NCMIS. All rights reserved.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Small Loading Box -->
  <div id="loadingBoxOverlay" class="loading-box-overlay"></div>
  <div id="loadingBox" class="loading-box">
    <div class="spinner"></div>
    <p>Signing in...</p>
  </div>

  <script>
    // Password Toggle
    const loginForm = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('toggle-password');
    const eyeIcon = document.getElementById('eye-icon');
    const loadingBox = document.getElementById('loadingBox');
    const loadingBoxOverlay = document.getElementById('loadingBoxOverlay');

    if (togglePassword && passwordInput && eyeIcon) {
      togglePassword.addEventListener('click', () => {
        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
          passwordInput.type = 'password';
          eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
        }
      });
    }

    // Form Loading State
    if (loginForm && submitBtn && btnText && loadingBox && loadingBoxOverlay) {
      loginForm.addEventListener('submit', function() {
        submitBtn.disabled = true;
        submitBtn.classList.add('btn-loading');
        btnText.textContent = 'Signing in...';

        // Show small loading box while the request is processed.
        loadingBox.classList.add('active');
        loadingBoxOverlay.classList.add('active');
      });
    }

    // Input field animations
    const inputs = document.querySelectorAll('input[type="text"], input[type="password"]');
    inputs.forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.parentElement.classList.add('scale-[1.02]');
      });
      
      input.addEventListener('blur', function() {
        this.parentElement.parentElement.classList.remove('scale-[1.02]');
      });
    });

    // Add floating animation to particles on load
    document.addEventListener('DOMContentLoaded', function() {
      const particles = document.querySelectorAll('.particle');
      particles.forEach((particle, index) => {
        particle.style.animationDelay = `${index * 2}s`;
      });
    });

    // Keyboard navigation
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey && loginForm && passwordInput) {
        const activeElement = document.activeElement;
        if (activeElement === passwordInput) {
          e.preventDefault();
          loginForm.requestSubmit();
        } else if (activeElement === document.querySelector('input[name="username"]')) {
          e.preventDefault();
          passwordInput.focus();
        }
      }
    });
  </script>
</body>
</html>
