version: "3.9"

services:
  flask_app:
    build: .
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysql_db       # must match MySQL service name
      DB_USER: root
      DB_PASSWORD: root       # match MYSQL_ROOT_PASSWORD
      DB_NAME: ncmis
      DB_PORT: 3306
    depends_on:
      - mysql_db

  mysql_db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ncmis
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pma
    depends_on:
      - mysql_db
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql_db
      MYSQL_ROOT_PASSWORD: root

volumes:
  mysql_data: